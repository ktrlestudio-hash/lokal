<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#10b981" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lokal — Encontrá lo que buscás</title>
    <meta name="description" content="Publicá lo que necesitás y que las tiendas locales te respondan." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Aplica dark class antes de render para evitar flash -->
    <script>
      (function() {
        var saved = localStorage.getItem('lokal-theme');
        var isDark = saved ? saved === 'dark' : true;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
